- name: even or add 
  hosts: local
  connection: local 
  vars:
    given_number: 7
  tasks: 
  - name: is even
    debug:
      msg: "give number: {{ given_number }} is even"
    when: given_number % 2 == 0 
  - name: is odd
    debug:
      msg: "give number: {{ given_number }} is even"
    when: given_number % 2 ! == 0 
